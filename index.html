<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>the-game</title>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <div id="overlay-content">
          <h1>the-game</h1>
          <p>Click to play</p>
          <span>WASD · Space to jump · F to fly · G noclip · E talk to NPC · Click &amp; drag to look</span>
        </div>
      </div>
      <div id="dialog" class="hidden">
        <div id="dialog-name">Villager</div>
        <div id="dialog-text"></div>
        <div id="dialog-hint">Press Enter to send · Escape to close</div>
        <div id="dialog-actions">
          <input id="dialog-input" type="text" placeholder="Say something..." maxlength="200" autocomplete="off" />
          <button id="give-coin-btn" title="Give 1 coin">💰 Give coin</button>
        </div>
      </div>
      <div id="crosshair">+</div>
      <div id="weapon-hud">
        <span id="weapon-name">Pistol</span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
